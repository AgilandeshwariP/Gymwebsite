<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>

<body>

    <section class="contact">

        <div class="left">

            <h1>Let’s Talk</h1>

            <p class="desc">Reach out to GYM IT: Our team is ready to assist<br>yu on your fitness journey.</p>


            <div class="info">
                <div class="icon">
                    <img src="phone-call.png" alt="phone">
                </div>
                <div class="text">
                    <h4>Phone</h4>
                    <p>+91 9790316406</p>
                </div>
            </div>


            <div class="info">
                <div class="icon">
                    <img src="email.png" alt="email">
                </div>
                <div class="text">
                    <h4>Email</h4>
                    <p>empoweredgetambaram@gmail.com</p>
                </div>
            </div>


            <div class="info">
                <div class="icon">
                    <img src="map.png" alt="location">
                </div>
                <div class="text">
                    <h4>Location</h4>
                    <p>
                        No- 23/24 CRP Garden,Kodambakkam
                        Chennai - 600024.
                    </p>
                </div>
            </div>

        </div>


        <div class="right">

            <h2>Contact Us</h2>

            <form>
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">

                <label>Mobile Number</label>
                <input type="text" placeholder="Enter Your Mobile Number">

                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <label>Message</label>
                <textarea placeholder="Write your message..."></textarea>

                <button type="submit">Submit</button>
            </form><br>

        </div>

    </section>
    <footer class="footer">
        <div class="footer-content">
            <p>EMPOWER EDGE - unisex fitness studio© 2025 All rights reserved</p>
        </div>
    </footer>

</body>

</html>
